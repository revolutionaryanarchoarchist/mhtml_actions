<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandboxed MHTML Viewer - {{ title }}</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        iframe { width: 100%; height: 100vh; border: none; }
        .info {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 1000;
        }
        .info a { color: #8cf; text-decoration: none; }
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 20px;
            border-radius: 5px;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <div class="info">
        📄 Viewing: {{ title }} &nbsp;|&nbsp;
        <a href="{{ url_for('download_results', title=title) }}" target="_blank">⬇️ Download</a>
    </div>
    <div id="loading">Loading MHTML...</div>
    <iframe id="viewer" style="display:none;" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals" referrerpolicy="no-referrer" title="Sandboxed MHTML viewer"></iframe>

    <script>
        const fileUrl = "{{ file_url }}";
        fetch(fileUrl)
            .then(response => response.blob())
            .then(blob => {
                // Use the correct MIME type for MHTML
                const mhtmlBlob = new Blob([blob], { type: 'message/rfc822' });
                const blobUrl = URL.createObjectURL(mhtmlBlob);
                const iframe = document.getElementById('viewer');
                iframe.src = blobUrl;
                iframe.style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                // Revoke the blob URL after the iframe loads to free memory
                iframe.onload = () => URL.revokeObjectURL(blobUrl);
            })
            .catch(err => {
                document.getElementById('loading').innerHTML = 'Failed to load MHTML: ' + err;
            });
    </script>
</body>
</html>
